<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 560" role="img" aria-labelledby="title desc">
  <title id="title">f6n copilot-usage flow</title>
  <desc id="desc">Flow diagram from wrapper command to hook capture and usage reports.</desc>
  <defs>
    <linearGradient id="sourceFill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fffaf2"/>
      <stop offset="100%" stop-color="#f3ebde"/>
    </linearGradient>
    <linearGradient id="coreFill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d8efe4"/>
      <stop offset="100%" stop-color="#c8e7d9"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2d7a5e"/>
    </marker>
  </defs>

  <rect width="1200" height="560" fill="#f4efe6"/>
  <text x="56" y="72" font-family="'Space Grotesk', 'Segoe UI', sans-serif" font-size="42" font-weight="700" fill="#17221f">How @f6n/copilot-usage Works</text>
  <text x="56" y="110" font-family="'Space Grotesk', 'Segoe UI', sans-serif" font-size="22" fill="#50615b">Wrapper + hook + local storage for durable Copilot usage history.</text>

  <rect x="60" y="175" width="332" height="132" rx="18" fill="url(#sourceFill)" stroke="#d2c6b7" stroke-width="2"/>
  <text x="86" y="218" font-family="'IBM Plex Mono', Consolas, monospace" font-size="18" fill="#2d7a5e">Step 1</text>
  <text x="86" y="252" font-family="'Space Grotesk', 'Segoe UI', sans-serif" font-size="28" font-weight="700" fill="#17221f">Run wrapper command</text>
  <text x="86" y="281" font-family="'IBM Plex Mono', Consolas, monospace" font-size="14" fill="#50615b">bunx @f6n/copilot-usage [copilot args]</text>

  <rect x="60" y="330" width="332" height="170" rx="18" fill="url(#sourceFill)" stroke="#d2c6b7" stroke-width="2"/>
  <text x="86" y="372" font-family="'IBM Plex Mono', Consolas, monospace" font-size="18" fill="#2d7a5e">Step 2</text>
  <text x="86" y="404" font-family="'Space Grotesk', 'Segoe UI', sans-serif" font-size="27" font-weight="700" fill="#17221f">Capture usage</text>
  <text x="86" y="433" font-family="'IBM Plex Mono', Consolas, monospace" font-size="14" fill="#50615b">sessionEnd hook -> --f6n-store-session</text>
  <text x="86" y="458" font-family="'IBM Plex Mono', Consolas, monospace" font-size="14" fill="#50615b">prompt fallback parses -p output summary</text>
  <text x="86" y="483" font-family="'IBM Plex Mono', Consolas, monospace" font-size="14" fill="#50615b">writes JSONL summary + archive files</text>

  <rect x="462" y="232" width="304" height="194" rx="22" fill="url(#coreFill)" stroke="#2d7a5e" stroke-width="2.5"/>
  <text x="492" y="276" font-family="'Space Grotesk', 'Segoe UI', sans-serif" font-size="30" font-weight="700" fill="#17221f">Local State</text>
  <text x="492" y="309" font-family="'IBM Plex Mono', Consolas, monospace" font-size="15" fill="#29594a">usage-summaries.jsonl</text>
  <text x="492" y="335" font-family="'IBM Plex Mono', Consolas, monospace" font-size="15" fill="#29594a">session-archive/*.events.jsonl</text>
  <text x="492" y="361" font-family="'IBM Plex Mono', Consolas, monospace" font-size="15" fill="#29594a">state.json + hook-debug.jsonl</text>
  <text x="492" y="387" font-family="'IBM Plex Mono', Consolas, monospace" font-size="15" fill="#29594a">deduped usage records by model/session</text>

  <rect x="822" y="170" width="320" height="120" rx="18" fill="#fffaf2" stroke="#d2c6b7" stroke-width="2"/>
  <text x="850" y="212" font-family="'Space Grotesk', 'Segoe UI', sans-serif" font-size="30" font-weight="700" fill="#17221f">Show Usage</text>
  <text x="850" y="244" font-family="'IBM Plex Mono', Consolas, monospace" font-size="15" fill="#50615b">--f6n-show-usage table output</text>

  <rect x="822" y="312" width="320" height="176" rx="18" fill="#17221f" stroke="#2a2e36" stroke-width="2"/>
  <text x="850" y="353" font-family="'Space Grotesk', 'Segoe UI', sans-serif" font-size="30" font-weight="700" fill="#fffaf2">Report downstream</text>
  <text x="850" y="386" font-family="'IBM Plex Mono', Consolas, monospace" font-size="15" fill="#9cb6ad">Use with @f6n/cli-usage for:</text>
  <text x="850" y="410" font-family="'IBM Plex Mono', Consolas, monospace" font-size="15" fill="#c9d1d9">combined Codex + Copilot totals</text>
  <text x="850" y="434" font-family="'IBM Plex Mono', Consolas, monospace" font-size="15" fill="#c9d1d9">daily/monthly/session grouping</text>
  <text x="850" y="458" font-family="'IBM Plex Mono', Consolas, monospace" font-size="15" fill="#c9d1d9">input/cached/output/reasoning/total</text>

  <path d="M 394 242 C 420 242, 430 266, 458 290" fill="none" stroke="#2d7a5e" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M 394 413 C 420 413, 430 383, 458 356" fill="none" stroke="#2d7a5e" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M 768 328 L 814 328" fill="none" stroke="#2d7a5e" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M 982 292 L 982 304" fill="none" stroke="#2d7a5e" stroke-width="4" marker-end="url(#arrow)"/>
</svg>
