<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 640" role="img" aria-labelledby="title desc">
  <title id="title">f6n copilot-usage hero</title>
  <desc id="desc">Decorative banner showing Copilot wrapper flow and usage capture.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f4efe6"/>
      <stop offset="100%" stop-color="#f8dac0"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2d7a5e"/>
      <stop offset="100%" stop-color="#4a9d7f"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#17221f" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect width="1200" height="640" fill="url(#bg)"/>
  <circle cx="120" cy="95" r="130" fill="#d8efe4" opacity="0.9"/>
  <circle cx="1080" cy="520" r="170" fill="#fffaf2" opacity="0.8"/>

  <text x="72" y="82" font-family="'IBM Plex Mono', Consolas, monospace" font-size="28" fill="#2d7a5e">f6n.run</text>
  <text x="72" y="132" font-family="'Space Grotesk', 'Segoe UI', sans-serif" font-size="56" font-weight="700" fill="#17221f">copilot-usage</text>
  <text x="72" y="182" font-family="'Space Grotesk', 'Segoe UI', sans-serif" font-size="28" fill="#50615b">Track every Copilot token, locally</text>

  <g filter="url(#shadow)">
    <rect x="70" y="230" width="1060" height="336" rx="20" fill="#1a1e24" stroke="#2a2e36" stroke-width="2"/>
    <rect x="70" y="230" width="1060" height="46" rx="20" fill="#22262e"/>
    <circle cx="98" cy="253" r="7" fill="#ff6057"/>
    <circle cx="118" cy="253" r="7" fill="#ffbd2e"/>
    <circle cx="138" cy="253" r="7" fill="#28c840"/>
    <text x="600" y="260" text-anchor="middle" font-family="'IBM Plex Mono', Consolas, monospace" font-size="14" fill="#7c8796">f6n-copilot-usage</text>

    <text x="96" y="316" font-family="'IBM Plex Mono', Consolas, monospace" font-size="19" fill="#58a6ff">❯ bunx @f6n/copilot-usage -p "summarize this module"</text>
    <text x="96" y="360" font-family="'IBM Plex Mono', Consolas, monospace" font-size="18" fill="#e6edf3">[copilot-usage] Usage tracking hook ready (.github/hooks/f6n-copilot-usage.json)</text>
    <text x="96" y="402" font-family="'IBM Plex Mono', Consolas, monospace" font-size="18" fill="#c9d1d9">✓ launching native copilot...</text>
    <text x="96" y="438" font-family="'IBM Plex Mono', Consolas, monospace" font-size="18" fill="#c9d1d9">✓ stored session=s-2026-03-01 entries=2 archive=session-archive/...</text>
    <text x="96" y="474" font-family="'IBM Plex Mono', Consolas, monospace" font-size="18" fill="#c9d1d9">✓ summary appended -> usage-summaries.jsonl</text>
    <text x="96" y="528" font-family="'IBM Plex Mono', Consolas, monospace" font-size="19" font-weight="600" fill="#28c840">capture complete: input + cached + output + reasoning + total</text>
  </g>

  <rect x="810" y="70" width="292" height="118" rx="14" fill="#fffaf2" stroke="#d2c6b7"/>
  <text x="836" y="108" font-family="'IBM Plex Mono', Consolas, monospace" font-size="14" fill="#2d7a5e">Drop-in replacement:</text>
  <rect x="836" y="122" width="112" height="28" rx="14" fill="#17221f"/>
  <text x="892" y="141" text-anchor="middle" font-family="'IBM Plex Mono', Consolas, monospace" font-size="13" fill="#fffaf2">copilot</text>
  <text x="955" y="141" font-family="'IBM Plex Mono', Consolas, monospace" font-size="17" fill="#50615b">→</text>
  <rect x="974" y="122" width="112" height="28" rx="14" fill="url(#accent)"/>
  <text x="1030" y="141" text-anchor="middle" font-family="'IBM Plex Mono', Consolas, monospace" font-size="13" fill="#fffaf2">copilot-usage</text>
</svg>
